services:
  db:
    image: postgres:15
    container_name: transcendence_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transcendence
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - transcendence_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d transcendence"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: transcendence_backend
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - transcendence_network

  frontend:
    build: ./frontend
    container_name: transcendence_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5180:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - transcendence_network

volumes:
  db_data:

networks:
  transcendence_network: